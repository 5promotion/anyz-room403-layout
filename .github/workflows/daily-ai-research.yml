name: Daily AI Research

on:
  schedule:
    # 毎朝 5:00 JST = 20:00 UTC (前日)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      categories:
        description: 'カンマ区切りのカテゴリ（空欄で全カテゴリ実行）'
        required: false
        default: ''

env:
  NODE_VERSION: '20'

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        category:
          - name: 自律エージェント
            topic: "自律エージェント AgentOps agent framework AI agent 最新動向"
            label: auto-agents
          - name: マルチエージェント
            topic: "マルチエージェント A2A agent-to-agent orchestration multi-agent 最新動向"
            label: multi-agents
          - name: ローカルLLM
            topic: "ローカルLLM open source LLM quantization ollama llama 最新動向"
            label: local-llm
          - name: Claude Code / Anthropic
            topic: "Claude Code Anthropic MCP model context protocol 最新動向"
            label: claude-code
          - name: AI×EC
            topic: "AI EC Amazon AI 楽天AI agentic commerce パーソナライズ 最新動向"
            label: ai-ec
          - name: AI業界その他
            topic: "AI資金調達 AI規制 AI業界動向 funding regulation 最新ニュース"
            label: others

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install tsx
        run: npm install -g tsx

      - name: Run Grok Research - ${{ matrix.category.name }}
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          npx tsx scripts/grok_context_research.ts \
            "${{ matrix.category.topic }}" \
            --output "/tmp/research-${{ matrix.category.label }}.md"

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          TITLE="📊 ${DATE} ${{ matrix.category.name }} リサーチレポート"
          BODY=$(cat "/tmp/research-${{ matrix.category.label }}.md")

          gh issue create \
            --title "${TITLE}" \
            --body "${BODY}" \
            --label "${{ matrix.category.label }},news-tracking"

  summary:
    runs-on: ubuntu-latest
    needs: research
    if: always()
    permissions:
      issues: write

    steps:
      - name: Create summary issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ=Asia/Tokyo date '+%Y-%m-%d')

          # 当日作成されたリサーチissueを取得
          ISSUES=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "news-tracking" \
            --search "created:${DATE}" \
            --json number,title \
            --jq '.[] | "- #\(.number) \(.title)"')

          if [ -z "$ISSUES" ]; then
            ISSUES="（リサーチissueが見つかりませんでした）"
          fi

          BODY=$(cat <<EOF
          ## ${DATE} デイリーAIリサーチ サマリー

          ### 本日のレポート一覧
          ${ISSUES}

          ---
          *Generated by [Grok Context Research](scripts/grok_context_research.ts) via GitHub Actions*
          EOF
          )

          gh issue create \
            --repo ${{ github.repository }} \
            --title "📋 ${DATE} デイリーリサーチ サマリー" \
            --body "${BODY}" \
            --label "news-tracking,summary"
